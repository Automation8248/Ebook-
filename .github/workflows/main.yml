name: Welib Automation with Video Record

on:
  workflow_dispatch: # Button daba kar manually run karne ke liye
  schedule:
    - cron: '0 14 * * *' # Daily at 14:00 UTC (10:00 AM New York Time)

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Xvfb & FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install firefox
          playwright install-deps

      - name: Run Automation & Record Screen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Xvfb ek 1920x1080 ki virtual screen banayega jise FFmpeg record karega
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python bot.py

      - name: Upload Video Artifact (Backup)
        if: always() # Script fail ho ya pass, backup zaroor save hoga
        uses: actions/upload-artifact@v4
        with:
          name: automation-files-backup
          path: |
            *.mp4
            *.pdf
            images/
          retention-days: 5
