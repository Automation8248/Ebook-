name: Welib Automation with Video Record

on:
  workflow_dispatch: # Manual run ke liye
  schedule:
    - cron: '0 10 * * *' # Rozana run karne ke liye (Optional)

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Xvfb & FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install xvfb ffmpeg -y

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          sbase install chromedriver

      - name: Run Automation & Record Screen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Xvfb ek 1920x1080 ki virtual screen banayega jise FFmpeg record karega
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python bot.py

      - name: Upload Video Artifact (Backup)
        uses: actions/upload-artifact@v4
        if: always() # Script fail hone par bhi video GitHub par save ho jayegi
        with:
          name: automation-video
          path: "*.mp4"
          retention-days: 5
